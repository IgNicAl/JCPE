# =============================================================================
# CONFIGURAÇÕES DE BANCO DE DADOS
# =============================================================================

# URL de conexão (lê DB_HOST, DB_PORT, DB_NAME do .env)
# Valor padrão é localhost:3306/jcpm_db
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:jcpm_db}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Sao_Paulo&characterEncoding=utf8&useUnicode=true

# Credenciais (lê DB_USER e DB_PASSWORD do .env)
# Padrão é root e senha em branco
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:51190290}

# Driver do MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =============================================================================
# CONFIGURAÇÕES DO POOL DE CONEXÕES HIKARICP
# =============================================================================

# Configurações otimizadas do HikariCP para melhor performance
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.validation-timeout=3000
spring.datasource.hikari.leak-detection-threshold=60000

# =============================================================================
# CONFIGURAÇÕES DO JPA E HIBERNATE
# =============================================================================

# Estratégia de criação do schema (use 'validate' em produção)
spring.jpa.hibernate.ddl-auto=update

# Mostrar SQL no console (desabilitar em produção)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Desabilitar open-in-view para melhor performance
spring.jpa.open-in-view=false

# Configurações de performance do Hibernate
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

# =============================================================================
# CONFIGURAÇÕES DO SERVIDOR
# =============================================================================

# Porta do servidor
server.port=8080

# Configurações de compressão para melhor performance
server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
server.compression.min-response-size=1024

# =============================================================================
# CONFIGURAÇÕES JWT
# =============================================================================

# (Lê JWT_SECRET e JWT_EXPIRATION do .env)
# Define um valor padrão longo caso o .env não seja encontrado
jwt.secret=${JWT_SECRET:mySecretKey123456789abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789}
# Define 24h como padrão
jwt.expiration=${JWT_EXPIRATION:86400000}

# =============================================================================
# CONFIGURAÇÕES DE LOGGING
# =============================================================================

logging.level.root=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.com.zaxxer.hikari=INFO
logging.level.org.springframework.security=WARN

# =============================================================================
# CONFIGURAÇÕES DE DESENVOLVIMENTO
# =============================================================================

# Corrigido: Removida a permissão de referências circulares. O problema foi corrigido no código.
# spring.main.allow-circular-references=true

spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

# =============================================================================
# CONFIGURAÇÕES DE VALIDAÇÃO E SERIALIZAÇÃO
# =============================================================================

spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=America/Sao_Paulo

spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false
