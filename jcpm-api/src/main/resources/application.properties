# =============================================================================
# CONFIGURAÇÕES DE BANCO DE DADOS
# =============================================================================

# URL de conexão com o banco de dados MySQL
# Parâmetros adicionais para melhor performance e compatibilidade
spring.datasource.url=jdbc:mysql://localhost:3306/jcpm_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Sao_Paulo&characterEncoding=utf8&useUnicode=true

# Credenciais do banco de dados
spring.datasource.username=root
spring.datasource.password=

# Driver do MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =============================================================================
# CONFIGURAÇÕES DO POOL DE CONEXÕES HIKARICP
# =============================================================================

# Configurações otimizadas do HikariCP para melhor performance
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.validation-timeout=3000
spring.datasource.hikari.leak-detection-threshold=60000

# =============================================================================
# CONFIGURAÇÕES DO JPA E HIBERNATE
# =============================================================================

# Estratégia de criação do schema (use 'validate' em produção)
spring.jpa.hibernate.ddl-auto=update

# Mostrar SQL no console (desabilitar em produção)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Remover dialect explícito - Hibernate detecta automaticamente
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Desabilitar open-in-view para melhor performance
spring.jpa.open-in-view=false

# Configurações de performance do Hibernate
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

# Cache de segundo nível (opcional)
spring.jpa.properties.hibernate.cache.use_second_level_cache=false
spring.jpa.properties.hibernate.cache.use_query_cache=false

# =============================================================================
# CONFIGURAÇÕES DO SERVIDOR
# =============================================================================

# Porta do servidor
server.port=8080

# Configurações de compressão para melhor performance
server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
server.compression.min-response-size=1024

# Configurações do Tomcat
server.tomcat.max-threads=200
server.tomcat.min-spare-threads=10
server.tomcat.connection-timeout=20000
server.tomcat.keep-alive-timeout=15000

# =============================================================================
# CONFIGURAÇÕES JWT
# =============================================================================

# Chave secreta JWT (use uma chave mais forte em produção)
jwt.secret=mySecretKey123456789abcdefghijklmnopqrstuvwxyz
# Expiração do token em milissegundos (24 horas)
jwt.expiration=86400000

# =============================================================================
# CONFIGURAÇÕES DE LOGGING
# =============================================================================

# Nível de logging geral
logging.level.root=INFO

# Logging específico para SQL (desabilitar em produção)
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Logging do HikariCP
logging.level.com.zaxxer.hikari=INFO

# Logging do Spring Security (reduzir ruído)
logging.level.org.springframework.security=WARN

# =============================================================================
# CONFIGURAÇÕES DE DESENVOLVIMENTO
# =============================================================================

# Permitir referências circulares (temporário - corrigir arquitetura)
spring.main.allow-circular-references=true

# Configurações para desenvolvimento
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

# =============================================================================
# CONFIGURAÇÕES DE VALIDAÇÃO E SERIALIZAÇÃO
# =============================================================================

# Configurações do Jackson para JSON
spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=America/Sao_Paulo

# Configurações de validação
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false
