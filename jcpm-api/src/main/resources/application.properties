# URL de conexão com o banco de dados MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/jcpm_db?createDatabaseIfNotExist=true
# Usuário do banco de dados
spring.datasource.username=root
# Senha do banco de dados (substitua pela sua senha)
spring.datasource.password=
# Driver do MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configurações do JPA e Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Configurações JWT
jwt.secret=mySecretKey123456789abcdefghijklmnopqrstuvwxyz
jwt.expiration=86400000

# Porta do servidor
server.port=8080
