
# Define uma rede interna única para que os containers possam
# se comunicar uns com os outros por nome (ex: 'database', 'backend').
networks:
  jcpe_net:
    driver: bridge

services:
  # =======================================================================
  # 1. CLOUDFLARE TUNNEL (cloudflared)
  # Função: Expõe sua aplicação à internet de forma segura.
  # =======================================================================
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: jcpe-tunnel
    restart: unless-stopped
    # Este é o seu NOVO token, que você acabou de gerar:
    command: tunnel --no-autoupdate run --token eyJhIjoiNzRlZGE5MDU3MzExZGMyNjhmNDY1YTRmZDFkNGFiNTIiLCJ0IjoiYmM5MzkxOTktYmQxOS00MDM1LWI3MmMtODQ1OWU5MjIwNWYzIiwicyI6Ik1EVm1OVFkyTVRRdFpHWmhZUzAwT1dNd0xUbGxPREl0WlRKaFpETTVOMkV4Wm1ZMiJ9
    # Conecta o tunnel à rede interna para que ele possa encontrar o 'jcpe-frontend'.
    networks:
      - jcpe_net

  # =======================================================================
  # 2. BANCO DE DADOS (MYSQL)
  # =======================================================================
  database:
    image: mysql:8.4
    restart: unless-stopped
    env_file: ./.env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p$$MYSQL_ROOT_PASSWORD" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jcpe_net

  # =======================================================================
  # 3. BACKEND (JAVA SPRING BOOT)
  # =======================================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ./.env
    environment:
      DB_HOST: database
      DB_PORT: 3306
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
    depends_on:
      database:
        condition: service_healthy
    networks:
      - jcpe_net

  # =======================================================================
  # 4. REDIS (CACHE)
  # =======================================================================
  redis:
    image: redis:7-alpine
    container_name: jcpe-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - jcpe_net

  # =======================================================================
  # 5. OLLAMA (OPCIONAL - LLM Local)
  # Remova o comentário abaixo se quiser rodar Ollama no Docker
  # =======================================================================
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: jcpe-ollama
  #   restart: unless-stopped
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama_data:/root/.ollama
  #   networks:
  #     - jcpe_net

  # =======================================================================
  # 6. AGENTES DE IA (PYTHON FASTAPI)
  # =======================================================================
  agents:
    build:
      context: ./agents
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ./.env
    environment:
      # Database
      DB_HOST: database
      DB_PORT: 3306

      # Redis Cache
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0

      # LLM Configuration
      # Para usar Gemini (padrão):
      LLM_PROVIDER: ${LLM_PROVIDER:-gemini}
      GEMINI_API_KEY: ${GEMINI_API_KEY}

      # Para usar Ollama (descomente o serviço ollama acima):
      # LLM_PROVIDER: ollama
      # OLLAMA_BASE_URL: http://ollama:11434
      # OLLAMA_MODEL: gemma2:9b
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - jcpe_net

  # =======================================================================
  # 7. FRONTEND (REACT + NGINX REVERSE PROXY)
  # Nenhuma porta pública é mais necessária. O Tunnel acessa pela rede interna.
  # =======================================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: jcpe-frontend # Nome fixo para o Tunnel encontrar
    restart: unless-stopped
    env_file: ./.env
    depends_on:
      backend:
        condition: service_started
      agents:
        condition: service_started
    networks:
      - jcpe_net
    # Nenhuma porta (ports:) é necessária aqui

volumes:
  # Volume para persistir os dados do banco de dados
  mysql_data:

  # Volume para persistir dados do Redis
  redis_data:

  # Volume para persistir modelos do Ollama (se habilitado)
  # ollama_data:
